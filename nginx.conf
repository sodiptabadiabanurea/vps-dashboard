# VPS Dashboard - Nginx reverse proxy config
# Copy to /etc/nginx/sites-available/vps-dashboard and symlink to sites-enabled

server {
    listen 443 ssl http2;
    server_name kakibaabu.duckdns.org;

    # SSL (update paths to your certs)
    ssl_certificate /etc/letsencrypt/live/kakibaabu.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kakibaabu.duckdns.org/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# HTTP redirect
server {
    listen 80;
    server_name kakibaabu.duckdns.org;
    return 301 https://$host$request_uri;
}
